# CD: main 푸시 → Docker 빌드 → Cloud Run 배포
# TODO: GCP 프로젝트 ID, 리전, 서비스명 채우고 GitHub Secrets 에
#       GCP_SA_KEY (서비스 계정 JSON) 등록 필요
name: deploy
# ⚠ GCP 설정(GitHub Secrets 에 GCP_SA_KEY) 전까지 자동배포 비활성화.
#   지금은 수동 실행(Actions 탭 > Run workflow)만 가능 → main 푸시해도 배포 안 돌고 빨간 오류 안 뜸.
#   배포 준비되면 아래를 다시 push 트리거로 바꾸면 됨:
#     on:
#       push:
#         branches: [main]
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & Deploy
        run: |
          gcloud run deploy jeju-pop-trail \
            --source . \
            --region asia-northeast3 \
            --allow-unauthenticated
